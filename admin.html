<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理後台 - 羅家新營豆菜麵</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- 多重備援 SDK 載入器 -->
    <script>
        function loadSupabase(srcs) {
            if (srcs.length === 0) {
                alert('核心組件載入失敗！請確認您的網路連線。');
                return;
            }
            const s = document.createElement('script');
            s.src = srcs[0];
            s.onload = () => {
                console.log('SDK 載入成功:', srcs[0]);
                if (typeof setupRealtime === 'function') setupRealtime();
                if (typeof render === 'function') render();
            };
            s.onerror = () => {
                console.warn('載入失敗，嘗試備用來源:', srcs[0]);
                loadSupabase(srcs.slice(1));
            };
            document.head.appendChild(s);
        }
        loadSupabase([
            'https://unpkg.com/@supabase/supabase-js@2',
            'https://cdnjs.cloudflare.com/ajax/libs/supabase/2.39.8/supabase.js',
            'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'
        ]);
    </script>

    <style>
        /* 新版管理後台樣式 - 緊湊統計 & 放大列表 */
        :root {
            --pending-bg: #fffaf5;
            --pending-border: #ffedd5;
        }

        body { background-color: #f8fafc; }

        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* 統計區塊 - 縮小 */
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .stats-row {
            display: flex;
            gap: 1rem;
        }

        .stat-mini-card {
            background: white;
            padding: 0.4rem 1rem;
            border-radius: 8px;
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            gap: 0.6rem;
            border: 1px solid #e2e8f0;
        }

        .stat-mini-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .stat-mini-value {
            font-size: 1.1rem;
            font-weight: 900;
            color: var(--primary);
        }

        /* 訂單列表 - 極大化 */
        .orders-table-wrapper {
            background: white;
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th {
            background: #f1f5f9;
            padding: 1rem;
            text-align: left;
            font-size: 0.9rem;
            font-weight: 800;
            color: #475569;
            text-transform: uppercase;
        }

        td {
            padding: 1.2rem 1rem;
            border-bottom: 2px solid #f1f5f9;
            vertical-align: middle;
        }

        .row-pending {
            background: var(--pending-bg);
            border-left: 8px solid var(--primary);
        }

        /* 內容文字大小優化 */
        .col-time { width: 80px; color: #64748b; font-size: 0.8rem; }
        .col-id { width: 100px; font-size: 1.2rem; font-weight: 900; color: #000; }
        .col-type { width: 110px; }
        .col-items { width: auto; font-size: 1.4rem; font-weight: 800; color: #111827; }
        .col-total { width: 100px; font-size: 1.3rem; font-weight: 900; color: var(--accent); text-align: right; }
        .col-status { width: 110px; text-align: center; }
        .col-action { width: 150px; text-align: center; }

        .type-badge {
            display: inline-block;
            padding: 0.1rem 0.4rem;
            background: #475569;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 900;
            color: white;
            margin-bottom: 0.2rem;
        }

        .table-num {
            font-size: 1.3rem;
            font-weight: 900;
            display: block;
        }

        .item-row {
            margin-bottom: 0.4rem;
            display: block;
            border-bottom: 1px dashed #e2e8f0;
            padding-bottom: 0.2rem;
        }

        .item-qty {
            background: var(--primary);
            color: white;
            padding: 0.1rem 0.5rem;
            border-radius: 6px;
            font-size: 1rem;
            margin-left: 0.6rem;
            font-weight: 900;
        }

        /* 按鈕優化 */
        .btn-complete {
            background: #22c55e;
            color: white;
            border: none;
            padding: 0.8rem 1rem;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(34, 197, 94, 0.2);
            width: 100%;
        }

        /* 響應式手機版佈局 (Media Queries) */
        @media (max-width: 768px) {
            .admin-container { padding: 0.75rem; }
            
            .admin-header { margin-bottom: 1rem; }
            .stats-row { width: 100%; }
            .stat-mini-card { flex: 1; padding: 0.4rem 0.6rem; }

            /* 隱藏表格標頭，改用卡片顯示 */
            thead { display: none; }
            
            table, tbody, tr, td { display: block; width: 100% !important; }
            
            .orders-table-wrapper { background: transparent; box-shadow: none; border: none; }
            
            tr {
                background: white;
                margin-bottom: 1rem;
                border-radius: 16px;
                box-shadow: var(--shadow-md);
                padding: 1rem;
                position: relative;
                border-left: 10px solid #e2e8f0;
            }
            
            tr.row-pending { border-left-color: var(--primary); }
            
            td {
                padding: 0.4rem 0 !important;
                border-bottom: none !important;
                text-align: left !important;
            }

            /* 手機版細節排序與樣式 - 徹底修正重疊 */
            .col-time { 
                display: block;
                text-align: right;
                font-size: 0.75rem;
                color: #94a3b8;
                margin-bottom: -1.2rem; /* 讓下一行推上來或是保持間距 */
            }
            .col-id { 
                display: inline-block;
                font-size: 1.1rem; 
                color: #1e293b; 
                font-weight: 800;
                margin-top: 0.2rem;
            }
            .col-type { 
                display: block; 
                width: auto !important; 
                margin-top: 0.5rem; 
            }
            .col-total { 
                display: flex; 
                justify-content: flex-end; 
                font-size: 1.5rem; 
                margin-top: -2.5rem;
                margin-bottom: 0.5rem;
            }
            .col-items { border-top: 1px solid #f1f5f9; padding-top: 0.8rem !important; margin-top: 0.5rem; margin-bottom: 1rem; }
            .col-status { text-align: left !important; margin-bottom: 1rem; }
            .col-status .status-tag { display: inline-block; width: 100%; text-align: center; }
            .col-action { margin-top: 0.5rem; }
            .btn-complete { padding: 1.2rem; font-size: 1.2rem; }
        }

        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
    </style>
</head>
<body>
    <nav class="glass-nav">
        <div class="nav-content">
            <div class="logo">
                <span class="logo-emoji">🏪</span>
                <h1>羅家新營豆菜麵 - 管理中心</h1>
            </div>
            <button onclick="clearData()" style="font-size: 0.8rem; background:none; border: 1px solid #e2e8f0; padding: 0.4rem 0.8rem; border-radius: 8px; color: #94a3b8; cursor: pointer">重置資料</button>
        </div>
    </nav>

    <div class="admin-container">
        <!-- 緊湊的統計區塊 -->
        <div class="admin-header">
            <div class="stats-row">
                <div class="stat-mini-card">
                    <span class="stat-mini-label">待處理訂單</span>
                    <span class="stat-mini-value" id="pending-count">0</span>
                    <span style="font-size: 1.2rem">⏳</span>
                </div>
                <div class="stat-mini-card">
                    <span class="stat-mini-label">今日累計營收</span>
                    <div style="display:flex; align-items:center; gap:0.5rem">
                        <span class="stat-mini-value" id="revenue-total" style="filter:blur(6px); transition:filter 0.3s">$0</span>
                        <button onclick="toggleRevenue()" id="revenue-toggle" style="background:none; border:none; cursor:pointer; font-size:1rem; padding:0">🔒</button>
                    </div>
                    <span style="font-size: 1.2rem">💰</span>
                </div>
            </div>
        </div>

        <!-- 放大後的訂單列表 -->
        <div class="orders-table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th class="col-time">時間</th>
                        <th class="col-id">單號</th>
                        <th class="col-type">桌號/類型</th>
                        <th class="col-items">點餐內容</th>
                        <th class="col-total">總計</th>
                        <th class="col-status">狀態</th>
                        <th class="col-action">操作</th>
                    </tr>
                </thead>
                <tbody id="orders-list">
                    <!-- Orders will be injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="shared.js"></script>
    <script>
        let revenueVisible = false;

        async function render() {
            try {
                const store = window.SharedStore;
                if (!store) return;
                
                const orders = await store.getOrders();
                const listContainer = document.getElementById('orders-list');
                
                // 更新統計
                const pendingOrders = orders.filter(o => o.status === 'pending');
                const completedOrders = orders.filter(o => o.status === 'completed');
                const todayTotal = completedOrders.reduce((sum, o) => sum + o.total_price, 0);
                
                document.getElementById('pending-count').innerText = pendingOrders.length;
                document.getElementById('revenue-total').innerText = `$${todayTotal}`;
                
                if (orders.length === 0) {
                    listContainer.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:10rem; color:#94a3b8; font-size:1.5rem">目前尚無任何訂單資料</td></tr>';
                    return;
                }

                listContainer.innerHTML = orders.map(order => `
                    <tr class="${order.status === 'pending' ? 'row-pending' : ''}">
                        <td class="col-time">
                            ${new Date(order.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
                        </td>
                        <td class="col-id">#${order.id}</td>
                        <td class="col-type">
                            <span class="type-badge">${order.order_type === 'dine-in' ? '內用' : '外帶'}</span>
                            <span class="table-num">${order.table_number || '-'}</span>
                        </td>
                        <td class="col-items">
                            ${order.items.map(i => `
                                <span class="item-row">• ${i.name} <span class="item-qty">x ${i.qty}</span></span>
                            `).join('')}
                        </td>
                        <td class="col-total">$${order.total_price}</td>
                        <td class="col-status">
                            <span class="status-tag ${order.status}">
                                ${order.status === 'pending' ? '處理中' : '已完成'}
                            </span>
                        </td>
                        <td class="col-action">
                            ${order.status === 'pending' ? `
                                <button class="btn-complete" onclick="updateStatus('${order.id}', 'completed')">收錢 / 完成</button>
                            ` : '<span style="color:#cbd5e1; font-weight:700">已結帳</span>'}
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error('渲染失敗:', err);
            }
        }

        async function updateStatus(id, status) {
            try {
                await window.SharedStore.updateOrderStatus(id, status);
                showToast('訂單處理完成');
                render();
            } catch (err) {
                showToast('更新失敗: ' + err.message, 'error');
            }
        }

        function toggleRevenue() {
            revenueVisible = !revenueVisible;
            const el = document.getElementById('revenue-total');
            const btn = document.getElementById('revenue-toggle');
            el.style.filter = revenueVisible ? 'none' : 'blur(6px)';
            btn.textContent = revenueVisible ? '🔓' : '🔒';
        }

        function setupRealtime() {
            const client = window.getSupabase();
            if (!client) {
                setTimeout(setupRealtime, 1000);
                return;
            }
            client.channel('orders')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, () => {
                    render();
                })
                .subscribe();
        }

        async function clearData() {
            if (confirm('警告：這將會清除資料庫中所有的訂單，並將單號歸零。確定要繼續嗎？')) {
                try {
                    await window.SharedStore.clearAll();
                    showToast('資料庫已清空');
                    render();
                } catch (err) {
                    showToast('清空失敗', 'error');
                }
            }
        }

        function showToast(msg, type = 'success') {
            const container = document.getElementById('toast-container');
            if (!container) return;
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }
    </script>
</body>
</html>
